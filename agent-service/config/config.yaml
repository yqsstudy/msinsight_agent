# Agent Service Configuration

llm:
  default_provider: "claude"
  providers:
    claude:
      api_key: "${CLAUDE_API_KEY}"
      api_url: "https://api.anthropic.com"
      model: "claude-sonnet-4-6"
      parameters:
        temperature: 0.7
        max_tokens: 4096
    openai:
      api_key: "${OPENAI_API_KEY}"
      api_url: "https://api.openai.com/v1"
      model: "gpt-4"
      parameters:
        temperature: 0.7
        max_tokens: 4096
    local:
      api_url: "http://localhost:8000/v1"
      model: "local-model"
      parameters:
        temperature: 0.7
        max_tokens: 4096

# MCP服务配置 - 支持多种传输方式
mcp:
  # 传输类型: stdio, sse, websocket, http
  transport: "stdio"

  # HTTP传输配置
  server_url: "http://localhost:5000"

  # Stdio传输配置 (当 transport: "stdio" 时使用)
  command: "python3"
  args: ["main.py"]
  env: {
    "MSINSIGHT_MCP_TRANSPORT": "stdio",
    "MSINSIGHT_LOG_LEVEL": "DEBUG",
    "MSINSIGHT_PATH_SECURITY_ENABLED": "false",
    "MSINSIGHT_CPP_MOCK_MODE": "true"
  }
  cwd: "/Users/ye/yangqisheng/msinsight_agent/mcp_service_code/ms_mcp"

  # SSE/WebSocket传输配置
  sse_url: "http://127.0.0.1:8765/sse"
  websocket_url: "ws://127.0.0.1:8765"
  api_key: null

  # 通用配置
  timeout: 60
  reconnect: true
  reconnect_interval: 5

rag:
  enabled: true
  base_url: "http://127.0.0.1:8001"
  retrieve_path: "/api/v1/retrieve"
  qa_path: "/api/v1/qa"
  timeout_seconds: 30
  top_k: 5

llm_assistance:
  enabled: true
  query_rewrite_enabled: true
  candidate_recommendation_enabled: true
  parameter_extraction_enabled: true
  summary_enhancement_enabled: false
  timeout_seconds: 30
  max_candidates: 5
  max_evidence_chars: 6000

orchestrator:
  auto_execute: true
  max_auto_steps: 5
  retry_count: 1
  require_confirmation_for_side_effects: true
  side_effect_tool_patterns:
    - "delete_*"
    - "write_*"
    - "export_*"
    - "start_*"
    - "stop_*"
    - "restart_*"
    - "submit_*"
    - "rebuild_*"

storage:
  sqlite_path: "./sessions/sessions.db"

report:
  format: "markdown"
  save_to_session_db: true
  enable_pdf_export: false

knowledge:
  documents_path: "./knowledge/docs"
  vector_store_path: "./knowledge/vectors"
  retrieval:
    keyword_weight: 0.4
    vector_weight: 0.6
    top_k: 3

case_lib:
  storage_path: "./cases"

session:
  storage_path: "./sessions"
  max_history: 100

analysis:
  default_flow: "full_analysis"
  retry_count: 1
  timeout: 30
